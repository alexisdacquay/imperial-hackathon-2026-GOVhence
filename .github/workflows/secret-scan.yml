name: secret-scan

# Scans every PR and every push to main for committed secrets, using gitleaks
# with the rules in .gitleaks.toml (includes crypto key/seed-phrase patterns).
#
# Security notes:
# - Runs on `pull_request`, so for fork PRs the workflow definition comes from
#   the BASE repo (this file), not the contributor's fork — they can't alter it.
# - The job only READS and scans files; it never builds or runs PR code, so an
#   untrusted PR cannot exfiltrate anything.
# - Token is read-only and no repo secrets are exposed to the job.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so earlier commits in the PR are scanned

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --no-banner \
            --exit-code 1
